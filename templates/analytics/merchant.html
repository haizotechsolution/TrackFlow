{% extends 'base.html' %}

{% block content %}

<section class="page-header mb-4">
    <div class="d-flex flex-wrap justify-content-between align-items-center gap-3">
        <div>
            <span class="eyebrow">Analytics</span>
            <h1 class="page-title mt-2">Merchant Analytics</h1>
            <p class="page-subtitle">Revenue, shipment growth, and operational performance in a polished analytics workspace.</p>
        </div>
        <span class="badge text-bg-primary">Monthly</span>
    </div>
</section>

<div class="row g-3 mb-4">
    <div class="col-md-4"><div class="stat-card"><div class="stat-icon"><i class="bi bi-graph-up-arrow"></i></div><h6>Revenue trend</h6><h2>+28%</h2></div></div>
    <div class="col-md-4"><div class="stat-card"><div class="stat-icon"><i class="bi bi-truck"></i></div><h6>Shipment SLA</h6><h2>94%</h2></div></div>
    <div class="col-md-4"><div class="stat-card"><div class="stat-icon"><i class="bi bi-arrow-repeat"></i></div><h6>RTO pressure</h6><h2>Low</h2></div></div>
</div>

<div class="card-box p-4">
    <div class="d-flex justify-content-between align-items-start gap-3 mb-4">
        <div>
            <span class="eyebrow">Revenue overview</span>
            <h2 class="h4 fw-bold mb-0">Monthly revenue</h2>
        </div>
        <div class="d-flex gap-2">
            <span class="skeleton-line" style="width: 64px"></span>
            <span class="skeleton-line" style="width: 42px"></span>
        </div>
    </div>

    <canvas id="analyticsChart" height="110"></canvas>

</div>

<script>

const analyticsChart = document.getElementById('analyticsChart');

new Chart(analyticsChart, {

    type: 'bar',

    data: {

        labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May'],

        datasets: [{

            label: 'Revenue',

            data: [50000, 70000, 90000, 120000, 150000],
            backgroundColor: 'rgba(37,99,235,.16)',
            borderColor: '#2563eb',
            borderWidth: 3,
            fill: true,
            tension: .42,
            pointRadius: 4,
            pointBackgroundColor: '#ffffff',
            pointBorderColor: '#2563eb',
            pointBorderWidth: 2

        }]
    },
    options: {
        responsive: true,
        plugins: { legend: { display: false } },
        scales: {
            x: { grid: { display: false } },
            y: { beginAtZero: true, grid: { color: 'rgba(148,163,184,.18)' } }
        }
    }

});

</script>

{% endblock %}
