<nav class="navbar top-navbar mb-4 p-3">

    <div class="container-fluid">

        <div>
            <span class="eyebrow">Workspace</span>
            <div class="navbar-brand fw-bold mb-0 p-0">Dashboard</div>
        </div>

        <div class="d-flex align-items-center gap-3">

            <div class="d-none d-xl-flex align-items-center gap-2 px-3 py-2 rounded-pill bg-light border">
                <i class="bi bi-search text-muted"></i>
                <span class="text-muted small">Search AWB, invoice, city</span>
            </div>

            <button class="btn btn-outline-secondary btn-sm" type="button" aria-label="Notifications">
                <i class="bi bi-bell"></i>
            </button>

            <span class="me-3">
                {% if request.user.is_authenticated %}
                    {{ request.user.email }}
                {% else %}
                    Guest
                {% endif %}
            </span>

            {% if request.user.is_authenticated %}
                <form class="d-inline" method="post" action="{% url 'account-web-logout' %}" onsubmit="localStorage.removeItem('access'); localStorage.removeItem('refresh');">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-outline-secondary btn-sm">
                        <i class="bi bi-box-arrow-right me-1"></i>
                        Logout
                    </button>
                </form>
            {% else %}
                <a href="{% url 'account-login-page' %}" class="btn btn-primary btn-sm">
                    Login
                </a>
            {% endif %}

        </div>

    </div>

</nav>
