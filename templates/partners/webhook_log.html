<!DOCTYPE html>
<html>
<head>
    <title>Webhook Logs</title>

    <style>
        body {
            font-family: Arial;
            margin: 40px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 12px;
            text-align: left;
        }

        th {
            background: #f5f5f5;
        }

        h2 {
            text-align: center;
        }
    </style>
</head>
<body>

<h2>Webhook Logs</h2>

<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Event</th>
            <th>Status</th>
            <th>Timestamp</th>
        </tr>
    </thead>

    <tbody>

        {% for log in logs %}
        <tr>
            <td>{{ log.id }}</td>
            <td>{{ log.event }}</td>
            <td>{{ log.status }}</td>
            <td>{{ log.created_at }}</td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="4">No logs found.</td>
        </tr>
        {% endfor %}

    </tbody>
</table>

</body>
</html>
