<!DOCTYPE html>
<html>
<head>
    <title>Carrier Configuration</title>

    <style>
        body {
            font-family: Arial;
            margin: 40px;
        }

        .container {
            width: 600px;
            margin: auto;
        }

        .card {
            border: 1px solid #ccc;
            border-radius: 10px;
            padding: 25px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            background: darkblue;
            color: white;
            border: none;
        }

        h2 {
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">

        <h2>Carrier Configuration</h2>

        <form method="POST">
            {% csrf_token %}

            <label>Carrier Name</label>
            <input type="text" name="carrier_name">

            <label>API Key</label>
            <input type="text" name="api_key">

            <label>Webhook URL</label>
            <input type="text" name="webhook_url">

            <button type="submit">
                Save Configuration
            </button>

        </form>

    </div>
</div>

</body>
</html>
