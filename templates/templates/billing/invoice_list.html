<!DOCTYPE html>
<html>

<head>

<title>Invoices</title>

<style>

body{
font-family:Arial;
background:#eef2ff;
padding:40px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
}

li{
padding:10px;
margin:10px;
background:#f3f4f6;
}

</style>

</head>

<body>

<div class="card">

<h1>Invoice List</h1>

<ul>

{% for i in invoices %}

<li>

Invoice :

{{ i.invoice_number }}

|

Amount :

{{ i.total }}

|

Paid :

{{ i.paid }}

</li>

{% empty %}

<li>No invoices</li>

{% endfor %}

</ul>

</div>

</body>

</html>
