<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ shipment.awb }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <main class="container py-4">
    <div class="p-4 bg-light rounded mb-4">
      <div class="d-flex justify-content-between align-items-center">
        <div>
          <h1 class="h2 mb-1">{{ shipment.awb }}</h1>
          <span class="badge text-bg-primary">{{ shipment.status }}</span>
        </div>
        <a class="btn btn-outline-primary" href="/api/shipments/{{ shipment.awb }}/label/">Download Label</a>
      </div>
    </div>
    <div class="row g-3">
      <div class="col-md-6"><div class="card card-body"><h2 class="h5">Sender</h2><p>{{ shipment.sender_address }}</p></div></div>
      <div class="col-md-6"><div class="card card-body"><h2 class="h5">Receiver</h2><p>{{ shipment.receiver_address }}</p></div></div>
    </div>
    <div class="card mt-3">
      <div class="card-body">
        <h2 class="h5">Package</h2>
        <p class="mb-0">{{ shipment.weight_kg }} kg · {{ shipment.service_type }} · COD {{ shipment.cod_amount }}</p>
      </div>
    </div>
  </main>
</body>
</html>
