<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bulk Upload</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <main class="container py-4">
    <h1 class="h3">Bulk upload shipments</h1>
    <p class="text-muted">CSV headers: sender_name, sender_phone, sender_address, sender_city, sender_state, sender_pincode, receiver_name, receiver_phone, receiver_address, receiver_city, receiver_state, receiver_pincode, weight_kg, service_type, cod_amount</p>
    <form class="card card-body" enctype="multipart/form-data" method="post" action="/api/shipments/bulk/">
      {% csrf_token %}
      <input class="form-control mb-3" type="file" name="file" accept=".csv" required>
      <button class="btn btn-primary" type="submit">Upload</button>
    </form>
  </main>
</body>
</html>
