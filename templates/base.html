<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>TrackFlow</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Chart JS -->

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>

        body {
            background: #f4f6f9;
            color: #111827;
        }

        .sidebar {
            width: 250px;
            min-height: 100vh;
            background: #111827;
            color: white;
            position: fixed;
            z-index: 10;
        }

        .content {
            margin-left: 250px;
            padding: 20px;
        }

        .stat-card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0px 2px 10px rgba(0,0,0,0.05);
        }

        .table-responsive {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
        }

        .empty-state {
            padding: 32px;
            text-align: center;
            color: #6b7280;
        }

        @media (max-width: 991px) {
            .sidebar {
                position: static;
                width: 100%;
                min-height: auto;
            }

            .content {
                margin-left: 0;
                padding: 16px;
            }

            .sidebar .nav {
                flex-direction: row !important;
                flex-wrap: wrap;
                gap: 8px;
            }
        }

    </style>

</head>
<body>

    {% include 'components/sidebar.html' %}

    <div class="content">

        {% include 'components/navbar.html' %}

        {% block content %}
        {% endblock %}

    </div>

</body>
</html>
