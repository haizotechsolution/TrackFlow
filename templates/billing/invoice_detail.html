<!DOCTYPE html>
<html>

<head>

<title>Invoice Detail</title>

<style>

body{
font-family:Inter,Arial,sans-serif;
padding:40px;
background:linear-gradient(135deg,#f8fafc,#eef4ff);
color:#0f172a;
}

.box{
background:rgba(255,255,255,.94);
padding:32px;
border-radius:22px;
border:1px solid rgba(148,163,184,.26);
box-shadow:0 18px 45px rgba(15,23,42,.08);
max-width:760px;
margin:auto;
}

h1{margin-top:0;font-size:32px;letter-spacing:0}
p{padding:14px 0;border-bottom:1px solid #e2e8f0;color:#334155}
p:last-child{border-bottom:0}

</style>

</head>

<body>

<div class="box">

<h1>Invoice Detail</h1>

<p>

Invoice Number :

{{ invoice.invoice_number }}

</p>

<p>

Amount :

{{ invoice.amount }}

</p>

<p>

GST :

{{ invoice.gst }}

</p>

<p>

Total :

{{ invoice.total }}

</p>

<p>

Paid :

{{ invoice.paid }}

</p>

</div>

</body>

</html>
