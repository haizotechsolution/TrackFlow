<!DOCTYPE html>
<html>

<head>

<title>COD Remittance</title>

<style>

body{
font-family:Inter,Arial,sans-serif;
padding:40px;
background:linear-gradient(135deg,#f8fafc,#eef4ff);
color:#0f172a;
}

table{
width:100%;
border-collapse:collapse;
background:white;
border-radius:18px;
overflow:hidden;
box-shadow:0 18px 45px rgba(15,23,42,.08);
}

th{
background:#0f172a;
color:white;
padding:14px;
text-align:left;
font-size:12px;
letter-spacing:.06em;
text-transform:uppercase;
}

td{
padding:14px;
border-bottom:1px solid #e2e8f0;
color:#334155;
}

h1{font-size:34px;margin-top:0}

</style>

</head>

<body>

<h1>COD Remittance</h1>

<table>

<tr>

<th>Shipment</th>

<th>COD Amount</th>

<th>Remitted</th>

</tr>

{% for c in cods %}

<tr>

<td>{{ c.shipment }}</td>

<td>{{ c.cod_amount }}</td>

<td>{{ c.remitted }}</td>

</tr>

{% endfor %}

</table>

</body>

</html>
