<!DOCTYPE html>
<html>

<head>

<title>Rate Cards</title>

<style>

body{
font-family:Arial;
margin:40px;
background:#f5f7fb;
}

.container{
background:white;
padding:20px;
border-radius:10px;
}

h1{
color:#1e40af;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th{
background:#2563eb;
color:white;
padding:12px;
}

td{
padding:12px;
border:1px solid #ddd;
text-align:center;
}

tr:nth-child(even){
background:#f9fafb;
}

</style>

</head>

<body>

<div class="container">

<h1>Rate Card List</h1>

<table>

<tr>

<th>ID</th>

<th>Merchant</th>

<th>Service</th>

<th>Base Price</th>

<th>Per KG</th>

<th>Status</th>

</tr>

{% for r in ratecards %}

<tr>

<td>{{ r.id }}</td>

<td>{{ r.merchant }}</td>

<td>{{ r.service_type }}</td>

<td>{{ r.base_price }}</td>

<td>{{ r.per_kg_price }}</td>

<td>{{ r.active }}</td>

</tr>

{% empty %}

<tr>

<td colspan="6">

No records found

</td>

</tr>

{% endfor %}

</table>

</div>

</body>

</html>
