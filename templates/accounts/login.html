<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TrackFlow Sign In</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { min-height: 100vh; background: radial-gradient(circle at top left, rgba(37,99,235,.18), transparent 34rem), linear-gradient(135deg,#07111f,#0f172a 54%,#eef4ff 54%); font-family: Inter, system-ui, -apple-system, "Segoe UI", sans-serif; }
    .auth-card { border: 1px solid rgba(148,163,184,.24); border-radius: 24px; box-shadow: 0 24px 70px rgba(15,23,42,.24); overflow: hidden; }
    .brand-panel { background: linear-gradient(135deg,#0f172a,#1d4ed8); color: white; }
    .form-control { border-radius: 12px; padding: .75rem .9rem; }
    .btn { border-radius: 12px; font-weight: 750; padding: .75rem 1rem; }
    .btn-primary { background: linear-gradient(135deg,#2563eb,#4f46e5); border: 0; }
  </style>
</head>
<body>
  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-9 col-xl-8">
        <div class="card auth-card">
          <div class="row g-0">
            <div class="col-lg-5 brand-panel p-4 p-lg-5 d-flex flex-column justify-content-between">
              <div>
                <div class="d-inline-flex align-items-center gap-2 mb-4"><i class="bi bi-box-seam fs-3"></i><strong class="fs-4">TrackFlow</strong></div>
                <h1 class="h2 fw-bold">Logistics work that feels calm.</h1>
                <p class="text-white-50 mt-3 mb-0">Sign in to manage shipments, tracking, billing, and analytics from the enterprise dashboard.</p>
              </div>
              <div class="small text-white-50 mt-5">Secure dashboard access</div>
            </div>
            <div class="col-lg-7">
          <div class="card-body p-4 p-lg-5">
            <h2 class="h4 fw-bold mb-1">Sign in</h2>
            <p class="text-muted mb-4">Welcome back to your shipment command center.</p>
            <div id="error" class="alert alert-danger d-none"></div>
            <form id="login-form">
              {% csrf_token %}
              <div class="mb-3">
                <label class="form-label" for="email">Email</label>
                <input class="form-control" id="email" type="email" autocomplete="email" autofocus required>
              </div>
              <div class="mb-3">
                <label class="form-label" for="password">Password</label>
                <input class="form-control" id="password" type="password" autocomplete="current-password" required>
              </div>
              <div class="d-flex justify-content-between align-items-center mb-3">
                <div class="form-check">
                  <input class="form-check-input" id="remember_me" type="checkbox">
                  <label class="form-check-label" for="remember_me">Remember me</label>
                </div>
                <a class="small" href="{% url 'password_reset' %}">Forgot password?</a>
              </div>
              <button class="btn btn-primary w-100" type="submit">Sign in</button>
            </form>
            <p class="mt-3 mb-0 small">No account? <a href="/api/accounts/page/register/">Register</a></p>
          </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
  <script>
    document.getElementById('login-form').addEventListener('submit', async (event) => {
      event.preventDefault();
      const response = await fetch('/api/token/', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
        },
        body: JSON.stringify({
          email: document.getElementById('email').value,
          password: document.getElementById('password').value,
          remember_me: document.getElementById('remember_me').checked
        })
      });
      if (!response.ok) {
        document.getElementById('error').textContent = 'Invalid email or password.';
        document.getElementById('error').classList.remove('d-none');
        return;
      }
      const data = await response.json();
      localStorage.setItem('access', data.access);
      localStorage.setItem('refresh', data.refresh);
      window.location.href = data.dashboard_url || '/api/analytics/dashboard/';
    });
  </script>
</body>
</html>
