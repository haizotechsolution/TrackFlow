<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TrackFlow Settings</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <main class="container py-4">
    <h1 class="h3 mb-4">Account settings</h1>
    <section class="row g-4">
      <div class="col-lg-6">
        <div class="card">
          <div class="card-body">
            <h2 class="h5">Profile</h2>
            <form id="profile-form">
              <input class="form-control mb-2" name="username" placeholder="Contact name">
              <input class="form-control mb-2" name="phone" placeholder="Phone">
              <input class="form-control mb-2" name="company_name" placeholder="Company name">
              <input class="form-control mb-2" name="gstin" placeholder="GSTIN">
              <button class="btn btn-primary" type="submit">Save</button>
            </form>
          </div>
        </div>
      </div>
      <div class="col-lg-6">
        <div class="card">
          <div class="card-body">
            <h2 class="h5">API key</h2>
            <code id="api-key">••••••••••••</code>
            <button class="btn btn-outline-secondary btn-sm ms-2" id="rotate-key" type="button">Rotate</button>
          </div>
        </div>
        <div class="card mt-3">
          <div class="card-body">
            <h2 class="h5">Webhooks</h2>
            <form id="webhook-form" class="d-flex gap-2">
              <input class="form-control" name="url" placeholder="https://example.com/webhook" required>
              <button class="btn btn-primary" type="submit">Add</button>
            </form>
            <ul id="webhooks" class="list-group mt-3"></ul>
          </div>
        </div>
      </div>
    </section>
  </main>
  <script>
    const token = localStorage.getItem('access');
    const headers = {'Content-Type': 'application/json', Authorization: `Bearer ${token}`};
    document.getElementById('rotate-key').addEventListener('click', async () => {
      if (!confirm('Rotate API key?')) return;
      const response = await fetch('/api/accounts/api-key/rotate/', {method: 'POST', headers});
      const data = await response.json();
      document.getElementById('api-key').textContent = data.api_key || 'Unavailable';
    });
    document.getElementById('profile-form').addEventListener('submit', async (event) => {
      event.preventDefault();
      const form = new FormData(event.target);
      await fetch('/api/accounts/profile/', {
        method: 'PATCH',
        headers,
        body: JSON.stringify({
          username: form.get('username'),
          phone: form.get('phone'),
          merchant: {company_name: form.get('company_name'), gstin: form.get('gstin')}
        })
      });
    });
    document.getElementById('webhook-form').addEventListener('submit', async (event) => {
      event.preventDefault();
      const url = new FormData(event.target).get('url');
      const response = await fetch('/api/accounts/webhooks/', {method: 'POST', headers, body: JSON.stringify({url, events: []})});
      const data = await response.json();
      const item = document.createElement('li');
      item.className = 'list-group-item';
      item.textContent = data.url;
      document.getElementById('webhooks').prepend(item);
      event.target.reset();
    });
  </script>
</body>
</html>
