<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TrackFlow Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { min-height: 100vh; background: radial-gradient(circle at top right, rgba(6,182,212,.16), transparent 30rem), linear-gradient(135deg,#07111f,#111827 48%,#eef4ff 48%); font-family: Inter, system-ui, -apple-system, "Segoe UI", sans-serif; }
    .auth-card { border: 1px solid rgba(148,163,184,.24); border-radius: 24px; box-shadow: 0 24px 70px rgba(15,23,42,.24); overflow: hidden; }
    .brand-panel { background: linear-gradient(135deg,#0f172a,#2563eb); color: white; }
    .form-control,.form-select { border-radius: 12px; padding: .75rem .9rem; }
    .btn { border-radius: 12px; font-weight: 750; padding: .75rem 1rem; }
    .btn-primary { background: linear-gradient(135deg,#2563eb,#4f46e5); border: 0; }
  </style>
</head>
<body>
  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-10 col-xl-9">
        <div class="card auth-card">
          <div class="row g-0">
            <div class="col-lg-4 brand-panel p-4 p-lg-5">
              <div class="d-inline-flex align-items-center gap-2 mb-4"><i class="bi bi-box-seam fs-3"></i><strong class="fs-4">TrackFlow</strong></div>
              <h1 class="h2 fw-bold">Launch a smarter shipping workspace.</h1>
              <p class="text-white-50 mt-3 mb-0">Create a secure account for merchant shipment, billing, and analytics access.</p>
            </div>
            <div class="col-lg-8">
          <div class="card-body p-4 p-lg-5">
            <h2 class="h4 fw-bold mb-1">Create merchant account</h2>
            <p class="text-muted mb-4">Set up your TrackFlow workspace in a few details.</p>
            <div id="result" class="alert d-none"></div>
            <form id="register-form">
              {% csrf_token %}
              <div class="row g-3">
                <div class="col-12">
                  <select class="form-select" name="role" aria-label="Account role">
                    <option value="MERCHANT" selected>Merchant</option>
                    <option value="CUSTOMER">Customer</option>
                  </select>
                </div>
                <div class="col-12"><input class="form-control" name="company_name" placeholder="Company name"></div>
                <div class="col-md-6"><input class="form-control" name="email" type="email" placeholder="Email" required></div>
                <div class="col-md-6"><input class="form-control" name="phone" placeholder="Phone"></div>
                <div class="col-md-6"><input class="form-control" name="gstin" placeholder="GSTIN"></div>
                <div class="col-md-6"><input class="form-control" name="password" type="password" placeholder="Password" required></div>
              </div>
              <button class="btn btn-primary mt-3" type="submit">Register</button>
            </form>
          </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
  <script>
    document.getElementById('register-form').addEventListener('submit', async (event) => {
      event.preventDefault();
      const form = new FormData(event.target);
      const payload = Object.fromEntries(form.entries());
      payload.address = {};
      const response = await fetch('/api/accounts/register/', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
        },
        body: JSON.stringify(payload)
      });
      const result = document.getElementById('result');
      result.className = response.ok ? 'alert alert-success' : 'alert alert-danger';
      result.textContent = response.ok ? 'Account created. You can sign in now.' : JSON.stringify(await response.json());
    });
  </script>
</body>
</html>
