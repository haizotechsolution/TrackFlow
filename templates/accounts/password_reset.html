<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reset Password | TrackFlow</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-5">
        <div class="card shadow-sm">
          <div class="card-body p-4">
            <h1 class="h4 mb-3">Reset password</h1>
            <form method="post">
              {% csrf_token %}
              {{ form.email.label_tag }}
              {{ form.email }}
              <button class="btn btn-primary w-100 mt-3" type="submit">Send reset link</button>
            </form>
            <p class="mt-3 mb-0 small"><a href="{% url 'account-login-page' %}">Back to sign in</a></p>
          </div>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
